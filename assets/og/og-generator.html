<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #ddd; }
  #card {
    width: 1200px; height: 630px;
    background: linear-gradient(135deg, #c2336e 0%, #7c3a6e 60%, #5b2a51 100%);
    color: #fff; padding: 64px 72px; position: relative; overflow: hidden;
    font-family: 'Inter', system-ui, sans-serif;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .blob1 { position: absolute; top: -200px; right: -160px; width: 540px; height: 540px; border-radius: 50%;
    background: radial-gradient(closest-side, rgba(255,255,255,.18), rgba(255,255,255,0)); }
  .blob2 { position: absolute; bottom: -200px; left: -120px; width: 480px; height: 480px; border-radius: 50%;
    background: radial-gradient(closest-side, rgba(251,207,225,.30), rgba(251,207,225,0)); }
  .top { display: flex; align-items: center; gap: 16px; position: relative; z-index: 1; }
  .brand { font-weight: 800; font-size: 30px; letter-spacing: -.02em; }
  .mid { position: relative; z-index: 1; }
  .eye { font-size: 17px; font-weight: 600; opacity: .8; letter-spacing: .12em; text-transform: uppercase; margin-bottom: 18px; }
  .head { font-family: 'Fraunces', Georgia, serif; font-size: 76px; font-weight: 600; line-height: 1.04; letter-spacing: -.01em; max-width: 980px; }
  .sub { font-size: 25px; font-weight: 500; opacity: .9; margin-top: 24px; max-width: 880px; }
  .foot { display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 1;
    padding-top: 22px; border-top: 1px solid rgba(255,255,255,.22); font-size: 17px; }
  .pills { display: flex; gap: 12px; }
  .pill { font-size: 15px; font-weight: 600; padding: 8px 16px; border-radius: 999px;
    background: rgba(255,255,255,.14); border: 1px solid rgba(255,255,255,.22); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #fbcfe1; display: inline-block; margin-right: 8px; }
</style>
</head>
<body>
  <div id="card">
    <div class="blob1"></div>
    <div class="blob2"></div>
    <div class="top">
      <svg width="56" height="56" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <rect width="32" height="32" rx="8" fill="rgba(255,255,255,.16)"/>
        <path d="M23 10.5A9 9 0 1 0 25 16" fill="none" stroke="#fff" stroke-width="2.6" stroke-linecap="round"/>
        <circle cx="24.4" cy="9.2" r="2.6" fill="#fbcfe1"/>
        <path d="M16 20.5c-2.3-1.7-3.8-3.1-3.8-4.9a2 2 0 0 1 3.8-.9 2 2 0 0 1 3.8.9c0 1.8-1.5 3.2-3.8 4.9z" fill="#fff"/>
      </svg>
      <div class="brand">HerCycleCalc</div>
    </div>

    <div class="mid">
      <div class="eye">Fertility · Ovulation · Pregnancy</div>
      <div class="head">Every stage, gently mapped out.</div>
      <div class="sub">Free due-date, ovulation and week-by-week pregnancy calculators, private, accurate, no sign-up.</div>
    </div>

    <div class="foot">
      <span><span class="dot"></span>hercyclecalc.com</span>
      <div class="pills">
        <span class="pill">No sign-up</span>
        <span class="pill">Private</span>
        <span class="pill">100% free</span>
      </div>
    </div>
  </div>
</body>
</html>
